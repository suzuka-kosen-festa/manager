name: Update manager-data Submodule

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-manager-data-submodule
  cancel-in-progress: false

jobs:
  update:
    name: Update manager-data
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: suzuka-kosen-festa
          repositories: |
            manager
            manager-data
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          submodules: recursive
          show-progress: false

      - name: Update manager-data
        run: |
          git -C manager-data fetch --quiet --depth=1 origin main
          git -C manager-data checkout --quiet --detach origin/main

          if git diff --quiet -- manager-data; then
            echo "manager-data is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manager-data
          git commit -m "chore: update manager-data submodule"
          git push origin HEAD:main
          echo "manager-data updated."
