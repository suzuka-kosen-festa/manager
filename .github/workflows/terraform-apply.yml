name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/terraform-apply.yml"
      - ".gitmodules"
      - "terraform/**"
      - "Makefile"
      - "manager-data"
  schedule:
    - cron: "*/30 * * * *"
  repository_dispatch:
    types:
      - terraform-apply
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-apply-production
  cancel-in-progress: false

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_github_org: ${{ vars.TARGET_GITHUB_ORG || 'suzuka-kosen-festa' }}
      TF_VAR_github_app_id: ${{ secrets.GH_APP_ID }}
      TF_VAR_github_app_installation_id: ${{ secrets.GH_APP_INSTALLATION_ID }}
      TF_VAR_github_app_pem_file: ${{ secrets.GH_APP_PRIVATE_KEY }}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: suzuka-kosen-festa
          repositories: |
            manager
            manager-data
          permission-contents: read

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive

      - name: Update manager-data
        working-directory: .
        run: |
          manager_data_branch="$(git config -f .gitmodules submodule.manager-data.branch)"
          git -C manager-data fetch --depth=1 origin "${manager_data_branch}"
          git -C manager-data checkout --detach FETCH_HEAD
          git -C manager-data log -1 --oneline

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan -no-color -out=tfplan
          terraform show -no-color tfplan > tfplan.txt

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured. Skipping Discord notification."
            exit 0
          fi

          {
            echo "Terraform apply が成功しました。"
            echo
            echo "Repository: ${GITHUB_REPOSITORY}"
            echo "Ref: ${GITHUB_REF_NAME}"
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo '```diff'
            cat tfplan.txt
            echo '```'
          } > discord-message.txt

          max_bytes=1900
          if [ "$(wc -c < discord-message.txt)" -gt "${max_bytes}" ]; then
            head -c "${max_bytes}" discord-message.txt > discord-message-truncated.txt
            {
              cat discord-message-truncated.txt
              echo
              echo "...(truncated)"
              echo '```'
            } > discord-message.txt
          fi

          jq -Rs '{content: .}' discord-message.txt > discord-payload.json
          curl --fail-with-body \
            -H "Content-Type: application/json" \
            -d @discord-payload.json \
            "${DISCORD_WEBHOOK_URL}"
