name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/terraform-apply.yml"
      - ".gitmodules"
      - "terraform/**"
      - "Makefile"
      - "manager-data"
  repository_dispatch:
    types:
      - terraform-apply
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: terraform-apply-production
  cancel-in-progress: false

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_github_org: ${{ vars.TARGET_GITHUB_ORG || 'suzuka-kosen-festa' }}
      TF_VAR_github_app_id: ${{ secrets.GH_APP_ID }}
      TF_VAR_github_app_installation_id: ${{ secrets.GH_APP_INSTALLATION_ID }}
      TF_VAR_github_app_pem_file: ${{ secrets.GH_APP_PRIVATE_KEY }}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: suzuka-kosen-festa
          repositories: |
            manager
            manager-data
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          submodules: recursive
          show-progress: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          set +e
          terraform init -no-color > terraform-init.log 2>&1
          status=$?
          if [ "${status}" -ne 0 ]; then
            echo "Terraform init failed. Logs are suppressed because this workflow is public."
            exit "${status}"
          fi
          echo "Terraform init completed."

      - name: Terraform Validate
        run: |
          set +e
          terraform validate -no-color > terraform-validate.log 2>&1
          status=$?
          if [ "${status}" -ne 0 ]; then
            echo "Terraform validate failed. Logs are suppressed because this workflow is public."
            exit "${status}"
          fi
          echo "Terraform validate completed."

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -detailed-exitcode -out=tfplan > terraform-plan.log 2>&1
          status=$?
          if [ "${status}" -eq 0 ]; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
          elif [ "${status}" -eq 2 ]; then
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
          else
            echo "Terraform plan failed. Logs are suppressed because this workflow is public."
            exit "${status}"
          fi

          terraform show -no-color tfplan > tfplan.txt 2> terraform-show.log
          status=$?
          if [ "${status}" -ne 0 ]; then
            echo "Terraform show failed. Logs are suppressed because this workflow is public."
            exit "${status}"
          fi
          echo "Terraform plan completed."

      - name: Terraform Apply
        run: |
          set +e
          terraform apply -auto-approve tfplan > terraform-apply.log 2>&1
          status=$?
          if [ "${status}" -ne 0 ]; then
            echo "Terraform apply failed. Logs are suppressed because this workflow is public."
            exit "${status}"
          fi
          echo "Terraform apply completed."

      - name: Notify Discord
        if: steps.plan.outputs.has_changes == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured. Skipping Discord notification."
            exit 0
          fi

          {
            echo "Terraform apply が成功しました。"
            echo
            echo "Repository: ${GITHUB_REPOSITORY}"
            echo "Ref: ${GITHUB_REF_NAME}"
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo '```diff'
            cat tfplan.txt
            echo '```'
          } > discord-message.txt

          max_bytes=1900
          if [ "$(wc -c < discord-message.txt)" -gt "${max_bytes}" ]; then
            head -c "${max_bytes}" discord-message.txt > discord-message-truncated.txt
            {
              cat discord-message-truncated.txt
              echo
              echo "...(truncated)"
              echo '```'
            } > discord-message.txt
          fi

          jq -Rs '{content: .}' discord-message.txt > discord-payload.json
          set +e
          http_status="$(curl --silent --output discord-response.txt --write-out "%{http_code}" \
            -H "Content-Type: application/json" \
            -d @discord-payload.json \
            "${DISCORD_WEBHOOK_URL}" 2> discord-curl.log)"
          curl_status=$?
          set -e

          if [ "${curl_status}" -ne 0 ]; then
            echo "Discord notification failed. Curl output is suppressed because this workflow is public."
            exit "${curl_status}"
          fi

          case "${http_status}" in
            2*) echo "Discord notification sent." ;;
            *)
              echo "Discord notification failed. Response body is suppressed because this workflow is public."
              exit 1
              ;;
          esac
